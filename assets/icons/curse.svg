  <line x1="35" y1="50" x2="65" y2="50" stroke="#c9a227" stroke-width="1.5" opacity="0.7"/>
  <line x1="38" y1="38" x2="62" y2="62" stroke="#c9a227" stroke-width="1" opacity="0.5"/>
