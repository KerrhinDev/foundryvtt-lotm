<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48" fill="#1a0a0a"/>
  <!-- Eye white -->
  <ellipse cx="50" cy="50" rx="40" ry="26" fill="#f0e8ff" opacity="0.9"/>
  <!-- Iris -->
  <circle cx="50" cy="50" r="18" fill="#8e44ad"/>
  <!-- Pupil — spiral shape via circle -->
  <circle cx="50" cy="50" r="10" fill="#1a0010"/>
  <!-- Spiral in pupil -->
  <path d="M50 44 Q56 47 50 50 Q44 53 50 56" fill="none" stroke="#c080ff" stroke-width="1.5" opacity="0.8"/>
  <!-- Veins -->
  <path d="M10 50 Q25 45 38 50" stroke="#c0392b" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M90 50 Q75 55 62 50" stroke="#c0392b" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M15 38 Q28 42 38 48" stroke="#c0392b" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Highlight -->
  <circle cx="43" cy="44" r="4" fill="white" opacity="0.4"/>
</svg>
